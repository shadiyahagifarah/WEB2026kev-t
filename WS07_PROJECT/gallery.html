 <!DOCTYPE html>
<html lang="fi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Gallery</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="styles/styles.css">
</head>

<body>
<nav class="navbar navbar-expand-lg navbar-light bg-light">
  <div class="container">
    <a class="navbar-brand" href="index.html">GEMCAPS BY SHADIYA</a>

    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
      ☰
    </button>

    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="shop.html">Shop</a></li>
        <li class="nav-item"><a class="nav-link" href="custom.html">Custom</a></li>
        <li class="nav-item"><a class="nav-link" href="gallery.html">Gallery</a></li>
        <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
      </ul>
    </div>
  </div>
</nav>
 <div class="container mt-5">

    <h1 class="text-center mb-5">Gallery</h1>

    <div id="capCarousel"
         class="carousel slide"
         data-bs-ride="carousel">

        <div class="carousel-inner">

            <div class="carousel-item active">
                <img src="images/lightgraycap.jpg"
                     class="d-block mx-auto rounded shadow gallery-img">
            </div>

            <div class="carousel-item">
                <img src="images/pinkpearlcap.jpg"
                     class="d-block mx-auto rounded shadow gallery-img">
            </div>

            <div class="carousel-item">
                <img src="images/blackpearlcap.jpg"
                     class="d-block mx-auto rounded shadow gallery-img">
            </div>

            <div class="carousel-item">
                <img src="images/redcap.jpg"
                     class="d-block mx-auto rounded shadow gallery-img">
            </div>

            <div class="carousel-item">
                <img src="images/browncap.jpg"
                     class="d-block mx-auto rounded shadow gallery-img">
            </div>

            <div class="carousel-item">
                <img src="images/blackfurcap.jpg"
                     class="d-block mx-auto rounded shadow gallery-img">
            </div>

        </div>

        <button class="carousel-control-prev"
                type="button"
                data-bs-target="#capCarousel"
                data-bs-slide="prev">

            <span class="carousel-control-prev-icon"></span>

        </button>

        <button class="carousel-control-next"
                type="button"
                data-bs-target="#capCarousel"
                data-bs-slide="next">

            <span class="carousel-control-next-icon"></span>

        </button>

    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
