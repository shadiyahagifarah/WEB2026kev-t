<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Custom Cap</title>

   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles/styles.css">

</head>

<body>
<nav class="navbar navbar-expand-lg navbar-light bg-light">
  <div class="container">
    <a class="navbar-brand" href="index.html">GEMCAPS BY SHADIYA</a>

    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
      ☰
    </button>

    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="shop.html">Shop</a></li>
        <li class="nav-item"><a class="nav-link" href="custom.html">Custom</a></li>
        <li class="nav-item"><a class="nav-link" href="gallery.html">Gallery</a></li>
        <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
      </ul>
    </div>
  </div>
</nav>

  <div class="designer-card">

    <img src="images/blackpearlcap.jpg" class="cap-image" alt="Custom cap design">

    <h1>Design Your Own Cap</h1>

    <form>

      <label>Name</label>
      <input type="text">

      <label>Cap Color</label>
      <select>
        <option>Black</option>
        <option>White</option>
        <option>Blue</option>
        <option>Green</option>
        <option>Red</option>
        <option>Pink</option>
      </select>

      <label>Size</label>
      <select>
        <option>S</option>
        <option>M</option>
        <option>L</option>
      </select>

      <label>Decorations</label>

      <div class="option">
        <input type="checkbox">
        <span>Pearls</span>
      </div>

      <div class="option">
        <input type="checkbox">
        <span>Rhinestones</span>
      </div>

      <div class="option">
        <input type="checkbox">
        <span>Bows</span>
      </div>

      <label>Your Text</label>
      <input type="text">

      <button type="submit">Submit Design</button>

    </form>

  </div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
